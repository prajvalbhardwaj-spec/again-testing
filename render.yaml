services:
  - type: web
    name: blog-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false

databases:
  - name: blog-db
    databaseName: blog
    user: blog_user
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all inbound traffic
